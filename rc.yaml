apiVersion: v1
kind: ReplicationController
metadata:
  name: rc-nginx       # ✅ Remove the dash, fix indentation
spec:
  replicas: 3
  selector:
    app: nginxapp
  template:
    metadata:
      name: tmp-nginx
      labels:
        app: nginxapp
    spec:
      containers:
        - name: c1
          image: nginx